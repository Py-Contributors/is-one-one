name: Welcome Bot
 
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]
  workflow_dispatch: # Allows the maintainer to run this workflow manually

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
 
    steps:
      - name: Welcome First-Time Issue Author
        if: github.event_name == 'issues'
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Welcome to **is-one-one**, @${{ github.event.issue.user.login }}!
 
            Thanks for opening your first issue. Our team of engineering students will look into this soon! We love exploring new and creative ways to prove `1 == 1`. 
 
            While you wait, please take a look at our [Contributing Guidelines](https://github.com) to see how we structure our project. We look forward to collaborating with you! 🚀
 
      - name: Welcome First-Time PR Author
        if: github.event_name == 'pull_request_target'
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            👋 Welcome to **is-one-one**, @${{ github.event.pull_request.user.login }}!
 
            Thank you for submitting your first pull request! We really appreciate your time and effort in contributing to the project. 
 
            Our automated test suite will run shortly to verify your contribution. In the meantime, please review our [Contributing Guidelines](https://github.com) to ensure your PR matches our repository requirements. Happy coding! 🧠
