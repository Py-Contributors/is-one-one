name: Update Contributor Wall

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:

concurrency:
  group: contributor-wall
  cancel-in-progress: false

jobs:
  update-wall:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch contributors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/contributors?per_page=100" \
            --paginate \
            | jq -s 'add | map(select(.type != "Bot"))' \
            > /tmp/contributors.json

      - name: Build wall
        run: python ./.github/scripts/build-contributor-wall.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contributor wall [skip ci]"
          file_pattern: README.md
